<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Simplifier — alekseilopatin.com</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --text:#f1f5f9; --muted:#94a3b8;
    --accent:#f59e0b; --accent2:#fbbf24; --good:#10b981; --mid:#eab308; --meh:#64748b;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; font-family:'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text);
    min-height:100%;
    background-image:radial-gradient(circle at 20% 0%, #1e3a5f33 0%, transparent 50%),
                     radial-gradient(circle at 80% 100%, #5b21b633 0%, transparent 50%);
  }
  button{font-family:inherit; cursor:pointer; border:none;}

  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:12px 18px; background:#0b1222cc; border-bottom:1px solid #ffffff14; position:sticky; top:0; z-index:10;
  }
  header h1{font-size:19px; margin:0; white-space:nowrap;}
  header h1 span{color:var(--accent2);}
  .tabs{display:flex; gap:6px; flex-wrap:wrap;}
  .tab{
    padding:7px 16px; border-radius:999px; background:var(--panel); color:var(--muted);
    font-weight:600; font-size:14px; transition:all .15s;
  }
  .tab.active{background:var(--accent); color:#1c1003;}
  .tab:hover:not(.active){background:var(--panel2); color:var(--text);}
  .spacer{flex:1;}

  .difficulty-row{
    display:flex; gap:8px; flex-wrap:wrap; padding:10px 18px; background:#0b122288;
  }
  .diff{
    display:flex; align-items:center; gap:7px; padding:8px 16px; border-radius:10px;
    background:var(--panel); color:var(--muted); font-weight:700; font-size:13px; transition:all .15s;
  }
  .diff.active{background:linear-gradient(135deg,#7c3aed,#db2777); color:#fff; box-shadow:0 2px 12px #db277755;}
  .diff:hover:not(.active){background:var(--panel2); color:var(--text);}

  .layout{
    display:grid; grid-template-columns:1.3fr 1fr; gap:16px; padding:18px; max-width:1180px; margin:0 auto;
  }
  @media (max-width:900px){ .layout{grid-template-columns:1fr;} }

  .card{
    background:var(--panel); border-radius:var(--radius); padding:18px; box-shadow:0 8px 24px #0006;
    border:1px solid #ffffff10;
  }
  .card h2{margin:0 0 12px; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px;}

  /* solver picker */
  .solver{display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center;}
  .solverName{
    font-size:clamp(24px,5vw,34px); font-weight:800; min-height:1.3em;
    background:linear-gradient(90deg,#fbbf24,#f472b6,#a78bfa); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .solverName.empty{color:var(--muted); background:none; -webkit-text-fill-color:var(--muted); font-size:16px; font-weight:600;}
  .pickbtn{
    padding:12px 30px; font-size:16px; font-weight:800; border-radius:999px;
    background:linear-gradient(180deg,var(--accent2),#d97706); color:#221302;
    box-shadow:0 4px 0 #92400e; transition:transform .08s;
  }
  .pickbtn:active{transform:translateY(2px); box-shadow:0 2px 0 #92400e;}
  .pickbtn:disabled{filter:grayscale(.6) brightness(.7); cursor:default;}

  /* exercise */
  .fracRow{display:flex; align-items:center; justify-content:center; gap:18px; padding:18px 0 10px; flex-wrap:wrap;}
  .prompt{font-size:15px; color:var(--muted); font-weight:600;}
  .frac{display:inline-flex; flex-direction:column; align-items:center; font-weight:800; font-size:clamp(34px,6vw,52px); line-height:1.15;}
  .frac .n, .frac .d{padding:0 10px;}
  .frac .bar{width:100%; height:4px; background:currentColor; border-radius:2px; margin:2px 0;}
  .eq{font-size:clamp(28px,5vw,42px); font-weight:800; color:var(--muted);}
  .reveal{
    text-align:center; min-height:24px; font-size:14px; color:var(--good); font-weight:700;
  }
  .padWrap{margin-top:8px;}
  .padHint{font-size:12px; color:var(--muted); text-align:center; margin-bottom:6px;}
  canvas.pad{
    width:100%; height:200px; display:block; border-radius:10px; background:#f8fafc;
    box-shadow:inset 0 0 0 2px #ffffff22, 0 4px 14px #0004; touch-action:none; cursor:crosshair;
  }
  .padBtns{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .pbtn{padding:9px 16px; border-radius:9px; font-weight:700; font-size:13px; background:var(--panel2); color:var(--text);}
  .pbtn:hover{background:#475569;}

  .scoreBtns{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
  .sbtn{
    flex:1; min-width:130px; padding:14px 10px; border-radius:11px; font-weight:800; font-size:14px;
    color:#fff; opacity:1; transition:transform .08s, filter .15s;
  }
  .sbtn small{display:block; font-weight:600; font-size:11px; opacity:.85; margin-top:2px;}
  .sbtn.correct{background:var(--good);}
  .sbtn.mistake{background:var(--mid); color:#241c02;}
  .sbtn.tried{background:var(--meh);}
  .sbtn:disabled{filter:grayscale(.7) brightness(.75); cursor:default;}
  .sbtn:not(:disabled):active{transform:scale(.97);}

  /* scoreboard */
  .board{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
  .row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px; background:#0b122266;
    transition:background .3s;
  }
  .row.flash{background:#f59e0b44;}
  .rank{width:22px; text-align:center; font-weight:800; color:var(--muted); font-size:13px;}
  .rname{flex:1; font-weight:600; font-size:14px;}
  .rpts{font-weight:800; color:var(--accent2); font-size:14px;}
  .resetRow{display:flex; justify-content:flex-end; margin-top:10px;}

  #fx{position:fixed; inset:0; z-index:55; pointer-events:none;}
</style>
</head>
<body>

<header>
  <h1>🧮 Fraction <span>Simplifier</span></h1>
  <div class="tabs" id="gradeTabs"></div>
  <div class="spacer"></div>
</header>

<div class="difficulty-row" id="diffTabs"></div>

<div class="layout">
  <div style="display:flex; flex-direction:column; gap:16px;">

    <div class="card">
      <h2>🎯 Who's solving?</h2>
      <div class="solver">
        <div class="solverName empty" id="solverName">Tap to pick a student</div>
        <button class="pickbtn" id="pickBtn">🎲 Pick Random Student</button>
      </div>
    </div>

    <div class="card">
      <h2>📝 Simplify this fraction</h2>
      <div class="fracRow">
        <span class="prompt">Simplify:</span>
        <div class="frac"><span class="n" id="fracN"></span><span class="bar"></span><span class="d" id="fracD"></span></div>
        <span class="eq">=</span>
        <div class="frac"><span class="n">?</span><span class="bar"></span><span class="d">?</span></div>
      </div>
      <div class="reveal" id="revealText"></div>
      <div class="padWrap">
        <div class="padHint">✍️ Handwrite the answer here</div>
        <canvas class="pad" id="pad"></canvas>
        <div class="padBtns">
          <button class="pbtn" id="clearBtn">🧽 Clear pad</button>
          <button class="pbtn" id="revealBtn">👁 Reveal answer</button>
          <button class="pbtn" id="skipBtn">🔄 New exercise (no score)</button>
        </div>
      </div>
      <div class="scoreBtns">
        <button class="sbtn correct" id="scoreCorrect">✅ Correct<small>+10 pts</small></button>
        <button class="sbtn mistake" id="scoreMistake">🟡 Small mistake<small>+5 pts</small></button>
        <button class="sbtn tried" id="scoreTried">🙁 Tried, no luck<small>+2 pts</small></button>
      </div>
    </div>

  </div>

  <div class="card">
    <h2>🏆 Scoreboard</h2>
    <ul class="board" id="board"></ul>
    <div class="resetRow"><button class="pbtn" id="resetScoresBtn">♻️ Reset scores</button></div>
  </div>
</div>

<canvas id="fx"></canvas>

<script>
'use strict';
/* =================== rosters (same classes as the student picker) =================== */
const DEFAULTS = [
  {label:'5A', names:['Paopao','Major','Shop','Win','Photo','Phu','Pete','Pun','Popun','Geo','Lego','Copter','Dhruva','Khun','Arty','Nampunch','Oengoey','Taew','Aunda','Gail','Napran','Milin','Kongkwan','Bright','Nicha','Fasai','Nava','Khaopon','Paint','Focus']},
  {label:'5B', names:['Khun','Buakaw','Ikkui','Petar','Pakorn','Techo','Perth','Spock','Prin','Krahm','Chamin','Prem','Chin','Pao','Irine','Fia','Benz','Nada (18)','Nabtang','Tonhom','Pround','Cream','Nada (23)','Jaoei','Kanom','Pun','Kaem','Pat','Stang','Aris']},
  {label:'5C', names:['Andew','Beam','Nuea','Kaowpun','Leo','Panther','Rio','Cheetah','Phupat','Tankhun','Pprize','Tawan','Dmax','Imaim','Jean','Data','Drive','Yam','Nicha','Namtan','Eiw','Meya','Baifern','Loma','I-oun','Pungping','Anya','Ongfong']},
];
const LS_KEY = 'fraction-quiz-v1';
let S;
try { S = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){}
if (!S || !Array.isArray(S.grades) || S.grades.length !== 3) {
  S = { grades: DEFAULTS.map(g => ({label:g.label, names:[...g.names], scores:{}})), current:0, difficulty:'easy', currentStudent:null, exercise:null, revealed:false };
}
const save = () => localStorage.setItem(LS_KEY, JSON.stringify(S));
const G = () => S.grades[S.current];

/* =================== utils =================== */
const irand = n => Math.floor(Math.random()*n);
const clamp = (x,a,b) => Math.max(a, Math.min(b,x));
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b, a%b]; } return a; }
function pickWeighted(items){
  const total = items.reduce((s,it)=>s+it[1],0);
  let r = Math.random()*total;
  for (const [v,w] of items){ r -= w; if (r <= 0) return v; }
  return items[items.length-1][0];
}
// biases toward `min` when skew > 1 — used so each tier still favors its simpler end
function biasedInt(min, max, skew){
  const t = Math.pow(Math.random(), skew);
  return Math.round(min + t*(max-min));
}
const PALETTE = ['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];

/* =================== fraction generation =================== */
// every exercise = (a*k)/(b*k) with gcd(a,b)=1 and k>1, so it is ALWAYS reducible —
// never a dead-end coprime fraction like 17/999
const TIERS = {
  easy:       {aMax:4,  bMax:6,  skew:1.3, kPool:[[2,55],[3,30],[4,15]]},
  medium:     {aMax:9,  bMax:14, skew:1.4, kPool:[[2,28],[3,26],[4,16],[5,12],[6,18]]},
  hard:       {aMax:15, bMax:20, skew:1.5, kPool:[[3,14],[4,10],[6,16],[7,20],[8,10],[9,10],[11,10],[13,10]]},
  impossible: {aMax:24, bMax:36, skew:1.6, kPool:[[7,10],[9,10],[11,12],[12,14],[13,10],[14,12],[15,10],[16,8],[18,10],[21,8],[24,6]]},
};
function coprimeBase(aMax, bMax, skew){
  for (let tries=0; tries<40; tries++){
    const a = biasedInt(1, aMax, skew);
    const b = biasedInt(a+1, bMax, skew);
    if (gcd(a,b) === 1) return [a,b];
  }
  return [1,2];
}
function genExercise(tierKey){
  const cfg = TIERS[tierKey];
  const [a,b] = coprimeBase(cfg.aMax, cfg.bMax, cfg.skew);
  const k = pickWeighted(cfg.kPool);
  return {n:a*k, d:b*k, simN:a, simD:b, k};
}

/* =================== confetti =================== */
const fx = document.getElementById('fx');
const fctx = fx.getContext('2d');
let parts = [], fxRunning = false;
function sizeFx(){ fx.width = innerWidth*devicePixelRatio; fx.height = innerHeight*devicePixelRatio; fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
sizeFx(); addEventListener('resize', sizeFx);
function burst(x,y,n=36){
  for (let i=0;i<n;i++){
    parts.push({x,y, vx:(Math.random()*2-1)*7, vy:-Math.random()*7-1, w:Math.random()*6+4, h:Math.random()*4+3,
      rot:Math.random()*Math.PI*2, vr:(Math.random()*2-1)*.25, c:PALETTE[irand(PALETTE.length)], life:Math.random()*40+70});
  }
  if (!fxRunning){ fxRunning = true; requestAnimationFrame(fxLoop); }
}
function fxLoop(){
  fctx.clearRect(0,0,innerWidth,innerHeight);
  parts = parts.filter(p => p.life>0 && p.y<innerHeight+30);
  for (const p of parts){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.vx*=0.99; p.rot+=p.vr; p.life--;
    fctx.save(); fctx.translate(p.x,p.y); fctx.rotate(p.rot);
    fctx.fillStyle=p.c; fctx.globalAlpha=clamp(p.life/30,0,1); fctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); fctx.restore();
  }
  if (parts.length) requestAnimationFrame(fxLoop); else { fxRunning=false; fctx.clearRect(0,0,innerWidth,innerHeight); }
}

/* =================== handwriting pad =================== */
const pad = document.getElementById('pad');
const pctx = pad.getContext('2d');
let drawing = false, lastX=0, lastY=0;
function sizePad(){
  const w = pad.clientWidth, h = pad.clientHeight;
  pad.width = w*devicePixelRatio; pad.height = h*devicePixelRatio;
  pctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  drawGuide();
}
function drawGuide(){
  const w = pad.clientWidth, h = pad.clientHeight;
  pctx.clearRect(0,0,w,h);
  pctx.strokeStyle = '#cbd5e133'; pctx.lineWidth = 2;
  pctx.beginPath(); pctx.moveTo(w*0.35, h/2); pctx.lineTo(w*0.65, h/2); pctx.stroke();
}
function clearPad(){ drawGuide(); }
function posFromEvent(e){
  const r = pad.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}
pad.addEventListener('pointerdown', e => {
  drawing = true; pad.setPointerCapture(e.pointerId);
  [lastX, lastY] = posFromEvent(e);
});
pad.addEventListener('pointermove', e => {
  if (!drawing) return;
  const [x,y] = posFromEvent(e);
  pctx.strokeStyle = '#1e293b'; pctx.lineWidth = 4; pctx.lineCap = 'round'; pctx.lineJoin = 'round';
  pctx.beginPath(); pctx.moveTo(lastX,lastY); pctx.lineTo(x,y); pctx.stroke();
  lastX = x; lastY = y;
});
addEventListener('pointerup', () => { drawing = false; });
sizePad();
addEventListener('resize', () => sizePad());

/* =================== rendering =================== */
function renderGradeTabs(){
  const el = document.getElementById('gradeTabs');
  el.innerHTML = '';
  S.grades.forEach((g,i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i===S.current ? ' active':'');
    b.textContent = g.label;
    b.onclick = () => {
      S.current = i; S.currentStudent = null;
      S.exercise = genExercise(S.difficulty); S.revealed = false;
      save(); renderAll(); clearPad();
    };
    el.appendChild(b);
  });
}
const DIFF_META = {
  easy:{ic:'🌱',label:'Easy'}, medium:{ic:'🌿',label:'Medium'}, hard:{ic:'🌳',label:'Hard'}, impossible:{ic:'💀',label:'Impossible'},
};
function renderDiffTabs(){
  const el = document.getElementById('diffTabs');
  el.innerHTML = '';
  for (const [key,m] of Object.entries(DIFF_META)){
    const b = document.createElement('button');
    b.className = 'diff' + (key===S.difficulty ? ' active':'');
    b.innerHTML = `${m.ic} ${m.label}`;
    b.onclick = () => {
      S.difficulty = key; S.exercise = genExercise(key); S.revealed = false;
      save(); renderAll(); clearPad();
    };
    el.appendChild(b);
  }
}
function renderSolver(){
  const el = document.getElementById('solverName');
  if (S.currentStudent){ el.textContent = S.currentStudent; el.classList.remove('empty'); }
  else { el.textContent = 'Tap to pick a student'; el.classList.add('empty'); }
  const scoreDisabled = !S.currentStudent;
  document.getElementById('scoreCorrect').disabled = scoreDisabled;
  document.getElementById('scoreMistake').disabled = scoreDisabled;
  document.getElementById('scoreTried').disabled = scoreDisabled;
}
function renderExercise(){
  if (!S.exercise) S.exercise = genExercise(S.difficulty);
  document.getElementById('fracN').textContent = S.exercise.n;
  document.getElementById('fracD').textContent = S.exercise.d;
  const rt = document.getElementById('revealText');
  rt.textContent = S.revealed
    ? `Simplified: ${S.exercise.simN}/${S.exercise.simD}  (divide both by ${S.exercise.k})`
    : '';
}
function renderBoard(){
  const el = document.getElementById('board');
  el.innerHTML = '';
  const rows = G().names.map(name => ({name, pts: G().scores[name] || 0}))
    .sort((a,b) => b.pts - a.pts);
  const medals = ['🥇','🥈','🥉'];
  rows.forEach((r,i) => {
    const li = document.createElement('li');
    li.className = 'row';
    if (r.name === lastScored) { li.classList.add('flash'); }
    li.innerHTML = `<span class="rank">${medals[i] || (i+1)}</span><span class="rname">${r.name}</span><span class="rpts">${r.pts}</span>`;
    el.appendChild(li);
  });
}
function renderAll(){ renderGradeTabs(); renderDiffTabs(); renderSolver(); renderExercise(); renderBoard(); }

/* =================== student randomizer =================== */
let spinning = false;
document.getElementById('pickBtn').onclick = () => {
  if (spinning) return;
  const names = G().names;
  if (!names.length) return;
  spinning = true;
  document.getElementById('pickBtn').disabled = true;
  const winner = names[irand(names.length)];
  const display = document.getElementById('solverName');
  display.classList.remove('empty');
  const dur = 2200, t0 = performance.now();
  function tick(){
    const t = clamp((performance.now() - t0)/dur, 0, 1);
    if (t < 1){
      display.textContent = names[irand(names.length)];
      const delay = 35 + 240*easeOutCubic(t)*easeOutCubic(t);
      setTimeout(() => requestAnimationFrame(tick), delay);
    } else {
      display.textContent = winner;
      S.currentStudent = winner;
      save();
      spinning = false;
      document.getElementById('pickBtn').disabled = false;
      renderSolver();
      const r = display.getBoundingClientRect();
      burst(r.left + r.width/2, r.top + r.height/2, 30);
    }
  }
  tick();
};

/* =================== exercise controls =================== */
document.getElementById('clearBtn').onclick = clearPad;
document.getElementById('revealBtn').onclick = () => { S.revealed = true; save(); renderExercise(); };
document.getElementById('skipBtn').onclick = () => {
  S.exercise = genExercise(S.difficulty); S.revealed = false; save(); renderExercise(); clearPad();
};

/* =================== scoring =================== */
let lastScored = null, flashTimer = null;
function score(points){
  if (!S.currentStudent) return;
  const g = G();
  g.scores[S.currentStudent] = (g.scores[S.currentStudent] || 0) + points;
  lastScored = S.currentStudent;
  save();
  renderBoard();
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { lastScored = null; renderBoard(); }, 1200);
  if (points === 10){
    const r = pad.getBoundingClientRect();
    burst(r.left + r.width/2, r.top + r.height/2, 26);
  }
  S.currentStudent = null;
  S.exercise = genExercise(S.difficulty);
  S.revealed = false;
  save();
  renderSolver(); renderExercise(); clearPad();
}
document.getElementById('scoreCorrect').onclick = () => score(10);
document.getElementById('scoreMistake').onclick = () => score(5);
document.getElementById('scoreTried').onclick = () => score(2);

/* =================== reset scores =================== */
document.getElementById('resetScoresBtn').onclick = () => {
  if (!confirm(`Reset all scores for ${G().label}?`)) return;
  G().scores = {}; save(); renderBoard();
};

/* =================== init =================== */
if (!S.exercise) S.exercise = genExercise(S.difficulty);
save();
renderAll();
</script>
</body>
</html>
